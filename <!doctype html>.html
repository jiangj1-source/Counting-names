<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Name Generation — Starfield</title>
  <style>
    html,body{height:100%;margin:0;background:#030310;color:#dfe7ff;font-family:Inter,system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
    .app{display:flex;flex-direction:column;height:100%}
    header{display:flex;align-items:center;gap:12px;padding:12px 16px;background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent)}
    .status{margin-left:auto;display:flex;gap:14px;align-items:center}
    .counter{font-weight:700;letter-spacing:0.6px}
    .progressWrap{width:260px}
    progress{width:100%;height:12px;appearance:none;border-radius:8px;overflow:hidden}
    progress::-webkit-progress-bar{background:transparent}
    progress::-webkit-progress-value{background:linear-gradient(90deg,#8cf7ff,#bfb7ff);border-radius:8px}
    main{position:relative;flex:1;overflow:hidden}
    canvas{width:100%;height:100%;display:block}
    .uiOverlay{position:absolute;left:12px;bottom:12px;background:rgba(2,6,12,0.45);padding:8px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.03)}
    .modeLabel{font-size:12px;color:#9fb3d6}
    .credits{position:absolute;right:12px;bottom:12px;font-size:12px;color:#9fb3d6;padding:8px}
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div style="font-weight:600">Name Generation — Starfield</div>
      <div class="status">
        <div class="progressWrap">
          <div style="font-size:12px;color:#9fb3d6">Completion</div>
          <progress id="progress" max="100" value="0"></progress>
        </div>
        <div style="text-align:right">
          <div style="font-size:12px;color:#9fb3d6">Remaining names</div>
          <div id="counter" class="counter">--</div>
        </div>
      </div>
    </header>
    <main>
      <canvas id="c"></canvas>
      <div class="uiOverlay"><div id="modeLabel" class="modeLabel">Starfield active</div></div>
      <div class="credits">No message on end — screen will clear</div>
    </main>
  </div>

  <script>
  (function(){
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W=0,H=0; function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight-72} window.addEventListener('resize',resize);resize();

    // Parameters
    const TOTAL = 240; // finite completion point
    let remaining = TOTAL;
    const progressEl = document.getElementById('progress');
    const counterEl = document.getElementById('counter');

    // Visual containers
    const stars = [];
    class Star{constructor(x,y,r){this.x=x;this.y=y;this.r=r;this.alpha=0;this.age=0;this.lifetime=1200+Math.random()*2200;this.state='in';this.jitter=Math.random()*0.8;}
      update(dt){ this.age+=dt; const t=this.age/this.lifetime; if(this.state==='in') this.alpha = Math.min(1, t*1.8); else this.alpha = Math.max(0,1-t*2.1); if(this.state==='out') this.alpha *= (0.6+Math.sin(this.age/90+this.jitter)*0.2); }
      draw(ctx){ ctx.globalAlpha = Math.max(0,Math.min(1,this.alpha)); ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1; }
    }

    // State flags
    let running = true; let last = performance.now(); let capped = 280; let glitch=false; let finalizing=false;

    function updateUI(){ progressEl.value = Math.round((1-remaining/TOTAL)*100); counterEl.textContent = remaining }

    // Spawn logic with tension mechanics
    function spawn(){ if(!running || finalizing) return; const pct = (1-remaining/TOTAL); const near = pct > 0.6; const panic = pct > 0.85;
      // dynamic probability: as completion approaches, prefer removals
      if(near && Math.random() < (0.5 + pct*0.6)){
        // remove an existing star if any
        if(stars.length && Math.random()<0.8){ const s = stars[Math.floor(Math.random()*stars.length)]; if(s) s.state='out'; }
        else addStar();
      } else {
        addStar();
      }

      // anomalies at high pct
      if(panic && Math.random()<0.09) triggerGlitch();

      remaining = Math.max(0, remaining-1); updateUI();
      scheduleNext();
    }

    function addStar(){ if(stars.length > capped) stars.shift(); const x = Math.random()*W; const y = Math.random()*H; const r = 0.6 + Math.random()*2.6; stars.push(new Star(x,y,r)); }

    // Glitch behaviors
    function triggerGlitch(){ glitch = true; const dur = 300 + Math.random()*1200; // reversible
      // reversed behavior window
      setTimeout(()=>{ glitch=false }, dur);
    }

    // Scheduling with irregular timing and slowing near completion
    let timer = null;
    function scheduleNext(){ if(remaining<=0 || finalizing) return; const pct = (1-remaining/TOTAL); const base = 48 + Math.pow(pct,1.8)*720; const jitter = (Math.random()-0.5)*base*0.6; const delay = Math.max(30, base + jitter); if(timer) clearTimeout(timer); timer = setTimeout(spawn, delay); }

    // Animation loop
    function frame(now){ const dt = now - last; last = now; if(finalizing){ // fade to near-empty
        // let existing stars fade out
        for(let i=stars.length-1;i>=0;i--){ const s=stars[i]; s.update(dt); if(s.alpha<=0.02) stars.splice(i,1); }
        render(); if(stars.length===0){ running=false; /* stop */ } else requestAnimationFrame(frame); return }

      // occasional missing frames to create instability when glitching
      if(glitch && Math.random()<0.12){ requestAnimationFrame(frame); return }

      // update stars
      for(let i=stars.length-1;i>=0;i--){ const s=stars[i]; s.update(dt); if(s.alpha<=0.01 || s.age > s.lifetime*1.8) stars.splice(i,1); }

      // flicker and subtle streaks as tension rises
      const pct = (1-remaining/TOTAL);
      if(pct>0.85 && Math.random()<0.05){ ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.strokeStyle='rgba(200,220,255,0.03)'; ctx.beginPath(); const y=Math.random()*H; ctx.moveTo(0,y); ctx.bezierCurveTo(W*0.3,y+18,W*0.6,y-18,W,y); ctx.stroke(); ctx.restore(); }

      render(); requestAnimationFrame(frame);
    }

    function render(){ // background
      const pct = (1-remaining/TOTAL);
      ctx.clearRect(0,0,W,H);
      const bgAlpha = 0.04 + Math.min(0.55, pct/1.8);
      ctx.fillStyle = `rgba(2,6,12,${bgAlpha})`; ctx.fillRect(0,0,W,H);

      // draw stars with additive glow
      ctx.save(); ctx.globalCompositeOperation='lighter'; for(const s of stars) s.draw(ctx); ctx.restore();

      // occasional subtle global inversion when glitch
      if(glitch && Math.random()<0.08){ ctx.save(); ctx.globalCompositeOperation='difference'; ctx.fillStyle='rgba(255,255,255,0.02)'; ctx.fillRect(0,0,W,H); ctx.restore(); }
    }

    // End behavior: when remaining reaches zero, trigger finalize to clear
    function endEverything(){ finalizing = true; if(timer) clearTimeout(timer); }

    // Start
    updateUI(); // populate some initial stars
    for(let i=0;i<28;i++) addStar(); scheduleNext(); requestAnimationFrame(frame);

    // Observe remaining to trigger end
    const watch = setInterval(()=>{ if(remaining<=0 && !finalizing){ clearInterval(watch); endEverything(); } },100);

    // Expose debug helpers
    window.simStar = {reset(){ remaining = TOTAL; updateUI(); stars.length=0; for(let i=0;i<28;i++) addStar(); finalizing=false; running=true; scheduleNext(); requestAnimationFrame(frame); }, get(){ return {remaining, TOTAL, stars:stars.length} }};
  })();
  </script>
</body>
</html>
